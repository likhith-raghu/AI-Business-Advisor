<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - POSSPOLE</title>
    <link rel="stylesheet" href="../css/login.css">
    <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
</head>
<body>
    <!-- Header with logo and text -->
    <header>
        <div class="logo-container">
            <img src="../assets/logo.png" alt="POSSPole Logo" class="logo">
            <span class="brand-name">POSSPOLE</span>
        </div>
    </header>

    <!-- Sign Up Form -->
    <div class="login-container">
        <h2>Create Account</h2>
        <div id="clerk-sign-up"></div>
        <div class="auth-links">
            <span>Already have an account? <a href="login.html">Sign In</a></span>
        </div>
    </div>

    <script>
        const clerkPublishableKey = 'pk_test_cHVyZS1zbHVnLTk3LmNsZXJrLmFjY291bnRzLmRldiQ';
        
        window.addEventListener('load', async function() {
            try {
                const clerk = new Clerk(clerkPublishableKey);
                await clerk.load();
                
                const signUpComponent = await clerk.mountSignUp(document.getElementById('clerk-sign-up'), {
                    appearance: {
                        elements: {
                            rootBox: {
                                boxShadow: 'none',
                                width: '100%'
                            },
                            card: {
                                border: 'none',
                                boxShadow: 'none',
                                backgroundColor: 'transparent'
                            }
                        }
                    }
                });

                if (clerk.session) {
                    window.location.href = '/dashboard';
                }
            } catch (error) {
                console.error('Error loading Clerk:', error);
                document.getElementById('clerk-sign-up').innerHTML = 
                    '<div style="color: red; text-align: center; margin-top: 20px;">Error initializing sign-up. Please try again later.</div>';
            }
        });
    </script>
</body>
</html>
