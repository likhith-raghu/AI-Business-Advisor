<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - POSSPOLE</title>
    <link rel="stylesheet" href="../css/otp.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../../assets/logo.png" alt="POSSPole Logo" class="logo">
            <span class="brand-name">POSSPOLE</span>
        </div>
    </header>

    <div class="otp-container">
        <h2>OTP Verification</h2>
        <p>Enter the OTP to verify</p>
        <form id="otp-form">
            <div class="otp-input-container">
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
            </div>
            <div id="error-message" class="error-message"></div>
            <div class="timer-container">
                <span>Time remaining: </span>
                <span id="countdown-timer">02:00</span>
            </div>
            <button type="submit">Proceed</button>
            <div class="resend-container">
                <a href="#" id="resend-otp" class="resend-link">Resend OTP</a>
            </div>
        </form>

        <!-- Confirmation Modal -->
        <div id="resend-modal" class="modal">
            <div class="modal-content">
                <h3>Didn't get OTP?</h3>
                <p>Want to Resend OTP?</p>
                <div class="modal-buttons">
                    <button class="modal-button cancel-button" id="cancel-resend">Cancel</button>
                    <button class="modal-button sure-button" id="confirm-resend">Sure</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/otp.js"></script>
</body>
</html>
